services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - 11434:11434
    volumes:
      - ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: qdrant
    restart: unless-stopped
    security_opt:
      - seccomp=unconfined
    environment:
      - QDRANT__STORAGE__MMAP_POPULATION=false
    ports:
      - 6333:6333
    volumes:
      - qdrant:/qdrant/storage

  openwebui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: openwebui
    restart: unless-stopped
    ports:
      - 3000:8080
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - VECTOR_DB=qdrant
      - QDRANT_URI=http://qdrant:6333
      - QDRANT_API_KEY=
      - QDRANT_PREFER_GRPC=false
      - QDRANT_GRPC_PORT=6334
      - QDRANT_TIMEOUT=30
      - WEBUI_NAME=LocalCompute AI
      - WEBSOCKET_EVENT_CALLER_TIMEOUT=180
      - AIOHTTP_CLIENT_TIMEOUT=120
    depends_on:
      - ollama
      - qdrant
      - m365-mail-service
    volumes:
      - openwebui:/app/backend/data
      - ./patches/retrieval_utils.py:/app/backend/open_webui/retrieval/utils.py
      - ./patches/middleware.py:/app/backend/open_webui/utils/middleware.py

  m365-mail-service:
    build: ./m365-mail-service
    container_name: m365-mail-service
    restart: unless-stopped
    ports:
      - 8010:8000
    environment:
      - M365_TENANT_ID=${M365_TENANT_ID:-common}
      - M365_CLIENT_ID=${M365_CLIENT_ID:-}
      - M365_CLIENT_SECRET=${M365_CLIENT_SECRET:-}
      - M365_REDIRECT_URI=${M365_REDIRECT_URI:-http://192.168.30.123:8010/auth/callback}
      - M365_SCOPES=${M365_SCOPES:-offline_access https://graph.microsoft.com/Mail.Read https://graph.microsoft.com/User.Read}
      - M365_DB_PATH=/app/data/mailboxes.sqlite3
    volumes:
      - ./m365-mail-service/data:/app/data

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - 8080:8080
    volumes:
      - ./searxng:/etc/searxng

volumes:
  ollama:
  qdrant:
  openwebui:
